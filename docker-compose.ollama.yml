# Full multi-server stack: WebOllama + TWO Ollama servers.
#
#   docker compose -f docker-compose.ollama.yml up -d
#
# WebOllama seeds "Default" (ollama1) automatically. To manage both servers,
# open http://127.0.0.1:5000/servers and add the second one:
#   Name: Server 2   Base URL: http://ollama2:11434
# Then pull/create/delete will broadcast to both, and the Models page shows
# per-server presence with one-click drift sync.
services:
  ollama1:
    image: ollama/ollama:latest
    container_name: ollama1
    volumes:
      - ollama1_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - ollama-network

  ollama2:
    image: ollama/ollama:latest
    container_name: ollama2
    volumes:
      - ollama2_data:/root/.ollama
    ports:
      - "11435:11434"
    restart: unless-stopped
    networks:
      - ollama-network

  webollama:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: ghcr.io/avanavan/webollama-multi:latest
    container_name: webollama
    ports:
      - "5000:5000"
    environment:
      # Seeds the first server ("Default" = ollama1); add ollama2 in the UI.
      - OLLAMA_API_BASE=http://ollama1:11434
    volumes:
      # Persist the managed server list (so the added Server 2 survives restarts).
      - webollama_data:/data
    restart: unless-stopped
    depends_on:
      - ollama1
      - ollama2
    networks:
      - ollama-network

volumes:
  ollama1_data:
    name: ollama1_data
  ollama2_data:
    name: ollama2_data
  webollama_data:
    name: webollama_data

networks:
  ollama-network:
    name: ollama-network
